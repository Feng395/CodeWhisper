<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeWhisper 网页录音转录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #startBtn {
            background: #4CAF50;
            color: white;
        }

        #startBtn:hover:not(:disabled) {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        #stopBtn {
            background: #f44336;
            color: white;
        }

        #stopBtn:hover:not(:disabled) {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .status.idle {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.recording {
            background: #ffebee;
            color: #c62828;
            animation: pulse 1.5s infinite;
        }

        .status.processing {
            background: #fff3e0;
            color: #f57c00;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .result {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            min-height: 100px;
            margin-bottom: 20px;
        }

        .result-text {
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 15px;
        }

        .corrections {
            font-size: 14px;
            color: #666;
        }

        .correction-item {
            background: #e8f5e9;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            margin: 5px 5px 5px 0;
        }

        .settings {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .setting-item {
            margin-bottom: 10px;
        }

        .setting-item label {
            display: inline-block;
            width: 100px;
            font-weight: 500;
            color: #555;
        }

        select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎤 CodeWhisper</h1>
        <p class="subtitle">网页实时语音转文字</p>

        <div class="settings">
            <div class="setting-item">
                <label>模型大小:</label>
                <select id="modelSelect">
                    <option value="tiny">Tiny (最快)</option>
                    <option value="base">Base</option>
                    <option value="small" selected>Small (推荐)</option>
                    <option value="medium">Medium</option>
                    <option value="large">Large (最准)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>语言:</label>
                <select id="languageSelect">
                    <option value="zh" selected>中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                </select>
            </div>
        </div>

        <div class="status idle" id="status">
            准备就绪，点击开始录音
        </div>

        <div class="error" id="error"></div>

        <div class="controls">
            <button id="startBtn">🎙️ 开始录音</button>
            <button id="stopBtn" disabled>⏹️ 停止录音</button>
        </div>

        <div class="result">
            <div class="result-text" id="resultText">
                转录结果将显示在这里...
            </div>
            <div class="corrections" id="corrections"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const resultText = document.getElementById('resultText');
        const corrections = document.getElementById('corrections');
        const errorDiv = document.getElementById('error');
        const modelSelect = document.getElementById('modelSelect');
        const languageSelect = document.getElementById('languageSelect');

        // 开始录音
        startBtn.addEventListener('click', async () => {
            try {
                errorDiv.style.display = 'none';

                // 请求麦克风权限
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                // 创建录音器
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    // 录音结束，开始转录
                    await transcribeAudio();
                };

                // 开始录音
                mediaRecorder.start();
                isRecording = true;

                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.className = 'status recording';
                status.textContent = '🔴 正在录音...';

            } catch (error) {
                showError('无法访问麦克风: ' + error.message);
            }
        });

        // 停止录音
        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;

                startBtn.disabled = false;
                stopBtn.disabled = true;
                status.className = 'status processing';
                status.textContent = '⏳ 正在转录...';
            }
        });

        // 转录音频
        async function transcribeAudio() {
            try {
                // 合并音频块
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });

                // 转换为 Base64
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);

                reader.onloadend = async () => {
                    const base64Audio = reader.result.split(',')[1];

                    // 发送到 API
                    const formData = new FormData();
                    formData.append('audio_data', base64Audio);
                    formData.append('model', modelSelect.value);
                    formData.append('language', languageSelect.value);
                    formData.append('fix_terms', 'true');
                    formData.append('format', 'wav');

                    const response = await fetch(`${API_URL}/api/transcribe/stream`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error('转录失败: ' + response.statusText);
                    }

                    const result = await response.json();

                    // 显示结果
                    displayResult(result);
                };

            } catch (error) {
                showError('转录失败: ' + error.message);
                status.className = 'status idle';
                status.textContent = '准备就绪，点击开始录音';
            }
        }

        // 显示结果
        function displayResult(result) {
            status.className = 'status idle';
            status.textContent = '✅ 转录完成！';

            resultText.textContent = result.text || '(无内容)';

            // 显示修正信息
            if (result.corrections && result.corrections.count > 0) {
                let correctionsHTML = `<strong>术语修正 (${result.corrections.count} 处):</strong><br>`;
                result.corrections.details.forEach(c => {
                    correctionsHTML += `<span class="correction-item">${c.wrong} → ${c.correct}</span>`;
                });
                corrections.innerHTML = correctionsHTML;
            } else {
                corrections.innerHTML = '<em>无术语修正</em>';
            }

            setTimeout(() => {
                status.textContent = '准备就绪，点击开始录音';
            }, 3000);
        }

        // 显示错误
        function showError(message) {
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
        }

        // 检查浏览器支持
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            showError('您的浏览器不支持录音功能，请使用 Chrome、Firefox 或 Edge');
            startBtn.disabled = true;
        }
    </script>
</body>

</html>
